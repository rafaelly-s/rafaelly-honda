<style>
    /* --- CONFIGURAÇÕES GERAIS (ESTILO IGUAL AO PRIMEIRO) --- */
    :root {
        --honda-blue: #0044cc;
        --honda-dark: #00102a;
        --gold: #ffcc00;
        --whatsapp-green: #25d366;
    }

    body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        background: linear-gradient(135deg, var(--honda-dark) 0%, var(--honda-blue) 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .main-wrapper {
        width: 100%;
        max-width: 600px;
        position: relative;
        z-index: 1;
    }

    /* --- LOGO --- */
    .logo-top {
        display: block;
        margin: 0 auto 20px auto;
        width: clamp(120px, 35vw, 180px);
        filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6));
    }

    /* --- ESTILO DOS CARDS --- */
    .card {
        background:rgba(255, 255, 255,

0.98);
        backdrop-filter: blur(10px);
        padding: clamp(20px, 5vw, 30px);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        margin-bottom: 25px;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .card::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, var(--gold), #ffaa00, var(--honda-blue));
        border-radius: 20px 20px 0 0;
    }

    h2 {
        margin: 10px 0 20px;
        font-size: clamp(1.2rem, 5vw, 1.6rem);
        text-align: center;
        text-transform: uppercase;
        background: linear-gradient(45deg, #002266, var(--honda-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
    }

    .moto-name {
        font-weight: 800;
        font-size: clamp(1rem, 4vw, 1.3rem);
        margin-bottom: 25px;
        color: white;
        text-align: center;
        background: linear-gradient(90deg, #003399, #005ce6);
        padding: 12px 20px;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0, 85, 255, 0.3);
        text-transform: uppercase;
    }

    /* --- FORMULÁRIO --- */
    label {
        font-weight: 700;
        margin-top: 15px;
        display: block;
        font-size: 13px;
        color: #002266;
        text-transform: uppercase;
    }

    input, select {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 2px solid #e0e6ed;
        margin-top: 6px;
        font-size: 16px;
        background: #f8fafc;
        font-family: 'Montserrat', sans-serif;
        box-sizing: border-box;
    }

    /* Bordas laterais coloridas para ficar igual ao outro */
    input[name="nome"] { border-left: 5px solid var(--honda-blue); }
    input[name="cpf"] { border-left: 5px solid var(--gold); }
    select[name="plano"] { border-left: 5px solid var(--honda-blue); }
    input[name="parcelaIdeal"] { border-left: 5px solid var(--whatsapp-green); }

    button {
        width: 100%;
        padding: 18px;
        background: linear-gradient(45deg, #128c7e, var(--whatsapp-green), #128c7e);
        background-size: 200% auto;
        border: none;
        margin-top: 25px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 800;
        color: white;
        cursor: pointer;
        text-transform: uppercase;
        box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        animation: gradientMove 3s infinite alternate;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

    /* --- CARROSSEL --- */
    .carousel {
        width: 100%;
        height: 240px;
        overflow: hidden;
        border-radius: 16px;
        background: white;
    }

    .carousel-track {
        display: flex;
        width: max-content;
        animation: scroll 25s linear infinite;
    }

    .carousel-track img {
        height: 240px;
        width: auto;
        min-width: 300px;
        object-fit: contain;
        padding: 10px;
    }

    @keyframes scroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }
</style>
</head>
<body>

<div class="main-wrapper">
    <img src="https://i.imgur.com/9b9ReTN.png" alt="Logo" class="logo-top">

    <div class="card">
        <h2 id="tituloMoto">Carregando Modelo...</h2>
        <div class="carousel">
            <div class="carousel-track" id="carouselTrack"></div>
        </div>
    </div>

    <div class="card">
        <h2>Simulação de Consórcio</h2>
        <p class="moto-name" id="motoEscolhida"></p>

        <form id="consForm">
            <label>Nome completo *</label>
            <input name="nome" placeholder="Digite seu nome completo" required>

            <label>CPF *</label>
            <input name="cpf" placeholder="000.000.000-00" required>

            <label>Plano de parcelas *</label>
            <select name="plano" id="planoSelect" required></select>

            <label>Tem pressa para contemplar? *</label>
            <select name="pressa" required>
                <option value="">Selecione uma opção</option>
                <option>Sim, tenho pressa</option>
                <option>Não, posso aguardar</option>
            </select>

            <label>Valor de parcela ideal (R$) *</label>
            <input type="number" name="parcelaIdeal" placeholder="Ex: 450" required>

            <input type="hidden" name="moto" id="motoInput">
            <button type="submit">📲 Enviar para WhatsApp</button>
        </form>
    </div>
</div>

document.getElementById('motoInput').value = moto.nome;

Object.entries(moto.parcelas).forEach(([p,v])=>{
    const opt=document.createElement('option');
    opt.value=p;
    opt.textContent=`${p}x de R$ ${v.toFixed(2)}`;
    planoSelect.appendChild(opt);
});

document.getElementById('consForm').addEventListener('submit', e => {
    e.preventDefault();
    const d = Object.fromEntries(new FormData(e.target));
    const msg = `*SIMULAÇÃO CONSÓRCIO REVEMAR*\n\n*Moto:* ${d.moto}\n*Nome:* ${d.nome}\n*CPF:* ${d.cpf}\n*Plano:* ${d.plano}x\n*Parcela Ideal:* R$ ${d.parcelaIdeal}\n*Tem pressa:* ${d.pressa}`;
    location.href = `https://wa.me/559492473785?text=${encodeURIComponent(msg)}`;
});
