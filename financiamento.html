<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Promoção CPF Aprovado - Revemar</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
    /* --- CONFIGURAÇÕES GERAIS --- */
    :root {
        --honda-blue: #0044cc;
        --honda-dark: #00102a;
        --gold: #ffcc00;
        --whatsapp-green: #25d366;
    }

    body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        background: linear-gradient(135deg, var(--honda-dark) 0%, var(--honda-blue) 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center; /* Centraliza no PC */
    }

    /* --- CONTAINER PRINCIPAL (LIMITADOR PC) --- */
    .main-wrapper {
        width: 100%;
        max-width: 600px; /* Largura ideal para desktop */
        position: relative;
        z-index: 1;
    }

    /* --- LOGO RECOMPENSIVA --- */
    .logo-cpf {
        display: block;
        margin: 0 auto 20px auto;
        width: clamp(100px, 30vw, 150px);
        filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6));
        animation: pulseLogo 3s infinite alternate;
    }

    @keyframes pulseLogo {
        from { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
        to { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); }
    }

    /* --- ESTILO DOS CARDS --- */
    .card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        padding: clamp(20px, 5vw, 30px);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        margin-bottom: 25px;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: transform 0.3s ease;
    }

    @media (min-width: 768px) {
        .card:hover { transform: translateY(-5px); }
    }

    .card::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, var(--gold), #ffaa00, var(--honda-blue));
        border-radius: 20px 20px 0 0;
    }

    h2 {
        margin: 10px 0 20px;
        font-size: clamp(1.2rem, 5vw, 1.6rem);
        text-align: center;
        text-transform: uppercase;
        background: linear-gradient(45deg, #002266, var(--honda-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
    }

    .moto-name {
        font-weight: 800;
        font-size: clamp(1rem, 4vw, 1.3rem);
        margin-bottom: 25px;
        color: white;
        text-align: center;
        background: linear-gradient(90deg, #003399, #005ce6);
        padding: 12px 20px;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0, 85, 255, 0.3);
        text-transform: uppercase;
    }

    /* --- FORMULÁRIO --- */
    label {
        font-weight: 700;
        margin-top: 15px;
        display: block;
        font-size: 13px;
        color: #002266;
        text-transform: uppercase;
    }

    input, select {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 2px solid #e0e6ed;
        margin-top: 6px;
        font-size: 16px;
        background: #f8fafc;
        font-family: 'Montserrat', sans-serif;
        box-sizing: border-box;
    }

    input:focus { border-color: var(--honda-blue); outline: none; background: white; }

    button {
        width: 100%;
        padding: 18px;
        background: linear-gradient(45deg, #128c7e, var(--whatsapp-green), #128c7e);
        background-size: 200% auto;
        border: none;
        margin-top: 25px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 800;
        color: white;
        cursor: pointer;
        text-transform: uppercase;
        box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        animation: gradientMove 3s infinite alternate;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

    /* --- CARROSSEL --- */
    .carousel {
        width: 100%;
        height: clamp(180px, 40vh, 260px);
        overflow: hidden;
        border-radius: 16px;
        margin-bottom: 10px;
        background: white;
    }

    .carousel-track {
        display: flex;
        width: max-content;
        animation: scroll 25s linear infinite;
    }

    .carousel-track img {
        height: clamp(180px, 40vh, 260px);
        width: auto;
        min-width: 280px;
        object-fit: contain;
        padding: 10px;
        transition: 0.3s;
    }

    @keyframes scroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }

    /* --- ZOOM VIEW --- */
    #zoomView {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 16, 42, 0.98);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    #zoomView img {
        width: 90%;
        max-width: 800px;
        border-radius: 15px;
        border: 2px solid var(--gold);
    }

    /* Cores das bordas laterais */
    input[name="nome"] { border-left: 5px solid var(--honda-blue); }
    input[name="cpf"] { border-left: 5px solid var(--gold); }
    input[name="whatsapp"] { border-left: 5px solid var(--whatsapp-green); }

</style>
</head>
<body>

<div class="main-wrapper">
    <img src="https://image2url.com/r2/default/images/1772572693263-8f07cbb3-a571-44e4-8412-081a82ed80d9.blob" alt="Logo" class="logo-cpf">

    <div class="card">
        <h2 id="tituloMoto">Carregando...</h2>
        <div class="carousel">
            <div class="carousel-track" id="carouselTrack"></div>
        </div>
    </div>

    <div class="card">
        <h2>✅ Simulação de Financiamento</h2>
        <p class="moto-name" id="motoEscolhida">Carregando...</p>

        <form id="finForm">
            <label>Nome completo *</label>
            <input name="nome" required placeholder="Ex: João da Silva">

            <label>CPF *</label>
            <input name="cpf" id="cpfInput" required placeholder="000.000.000-00">

            <label>Data de Nascimento *</label>
            <input name="nascimento" type="date" required>

            <label>Celular *</label>
            <input name="whatsapp" required placeholder="(99) 99999-9999">

            <label>Profissão *</label>
            <select name="tipo" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Autônomo">Autônomo</option>
                <option value="Assalariado">Assalariado</option>
            </select>

            <label>Renda Mensal (R$) *</label>
            <input name="renda" type="number" required placeholder="Ex: 2000">

            <label>Possui habilitação? *</label>
            <select name="habilitacao" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Sim">Sim</option>
                <option value="Não">Não</option>
            </select>

            <label>Valor da entrada (R$)</label>
            <input name="entrada" type="number" placeholder="Ex: 1500">

            <input type="hidden" name="moto" id="motoInput">
            <button type="submit">📲 Enviar para WhatsApp</button>
        </form>
    </div>
</div>

<div id="zoomView" onclick="this.style.display='none'">
    <img id="zoomImg">
</div>

const params = new URLSearchParams(window.location.search);
const motoId = params.get("moto");
const motoSelecionada = motos.find(m => m.id === motoId) || motos[0];

document.getElementById("tituloMoto").innerText = motoSelecionada.nome;
document.getElementById("motoEscolhida").innerText = motoSelecionada.nome;
document.getElementById("motoInput").value = motoSelecionada.nome;

const imagensMoto = [motoSelecionada.img1, motoSelecionada.img2, motoSelecionada.img3];
const track = document.getElementById("carouselTrack");
track.innerHTML = [...imagensMoto, ...imagensMoto].map(src => `<img src="${src}" onclick="abrirZoom('${src}')">`).join("");

function abrirZoom(src){
    document.getElementById("zoomImg").src = src;
    document.getElementById("zoomView").style.display = "flex";
}

document.getElementById("finForm").addEventListener("submit", function(e){
    e.preventDefault();
    const fd = new FormData(this);
    const data = Object.fromEntries(fd.entries());
    const msg = `*INFORMAÇÕES NECESSÁRIAS PARA PRÉ-ANÁLISE*
*Moto:* ${data.moto}
*Nome:* ${data.nome}
*CPF:* ${data.cpf}
*Nascimento:* ${data.nascimento}
*Celular:* ${data.whatsapp}
*Renda:* R$ ${data.renda}
*Tipo:* ${data.tipo}
*Habilitação:* ${data.habilitacao}
*Entrada:* R$ ${data.entrada || "0"}`;
    window.location.href = `https://wa.me/559492473785?text=${encodeURIComponent(msg)}`;
});
